<div class="card resumen border-0">    
    <div class="row">
        <div class="aging-global">
            @if (aging.total > 0) {
                <div class="barra">
                    <div
                        class="segment ok"
                        [style.width.%]="(aging.bucket0_30 / aging.total) * 100"
                    ></div>

                    <div
                        class="segment medio"
                        [style.width.%]="
                            (aging.bucket31_60 / aging.total) * 100
                        "
                    ></div>

                    <div
                        class="segment alerta"
                        [style.width.%]="
                            (aging.bucket61_90 / aging.total) * 100
                        "
                    ></div>

                    <div
                        class="segment critico"
                        [style.width.%]="
                            (aging.bucket90mas / aging.total) * 100
                        "
                    ></div>
                </div>
            }
        </div>
    </div>
    <div class="row mt-2">
        <div class="col-4">
            <div class="detalle">0-30 días</div>

            <div class="detalle">31-60 días</div>
            <div class="detalle">61-90 días</div>
            <div class="detalle">+90 días</div>
        </div>
        <div class="col">
            <div class="detalle ok text-end">
                <span class="fw-bold text-black me-2 col-numero">{{
                    aging.bucket0_30 | formatearValor: "$"
                }}</span>
            </div>

            <div class="detalle medio text-end">
                <span class="fw-bold text-black me-2 col-numero">{{
                    aging.bucket31_60 | formatearValor: "$"
                }}</span>
            </div>

            <div class="detalle alerta text-end">
                <span class="fw-bold text-black me-2 col-numero">{{
                    aging.bucket61_90 | formatearValor: "$"
                }}</span>
            </div>

            <div class="detalle critico text-end">
                <span class="fw-bold text-black me-2 col-numero">{{
                    aging.bucket90mas | formatearValor: "$"
                }}</span>
            </div>
        </div>
    </div>
    <div class="kpi-global text-center">
        <!-- <h4>Estado financiero general</h4> -->

        <span
            class="badge rounded-pill fs-5 mt-3"
            [ngClass]="getEstadoGlobal(aging)"
        >
            {{ getTextoEstado(getEstadoGlobal(aging)) }}
        </span>
    </div>
</div>
