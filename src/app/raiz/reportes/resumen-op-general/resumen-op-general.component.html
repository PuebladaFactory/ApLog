<h2>Resumen de Operaciones - Operatorioa Global</h2>
<app-filtro-periodo
  (periodoChange)="onPeriodoChange($event)">
</app-filtro-periodo>

@if (resumenes$ | async; as resumenes) {
    <app-tabla-resumen
    [resumenes]="resumenes"
    [tipo]="'general'"
    [tituloPeriodo]="tituloPeriodo"
    [razonSocial]="'General'"
    >
  </app-tabla-resumen>
} @else {
    <app-spinner></app-spinner>
}
